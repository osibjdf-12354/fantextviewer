name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Create ephemeral release key
        shell: powershell
        run: ./tool/create_local_keystore.ps1

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Verify APK signature
        shell: powershell
        run: |
          $apksigner = Get-ChildItem "$env:ANDROID_SDK_ROOT\build-tools" -Recurse -Filter apksigner.bat |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if ($null -eq $apksigner) { throw "apksigner.bat not found" }
          & $apksigner.FullName verify --verbose build/app/outputs/flutter-apk/app-release.apk
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: geulbom-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
